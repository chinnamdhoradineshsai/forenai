services:
  - type: web
    name: forenai-backend
    env: node
    plan: free
    rootDir: src/backend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: PORT
        value: 8000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
